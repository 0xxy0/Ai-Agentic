# ══════════════════════════════════════════════════════════════════════════════
#  Nginx Load Balancer — ChurnAI Production Stack
#  Traffic flow: Internet → Nginx (80) → Node instances (3000) → ML (8000)
# ══════════════════════════════════════════════════════════════════════════════

# ── Worker processes — auto = one per CPU core ─────────────────────────────────
worker_processes auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /tmp/nginx.pid;

events {
    worker_connections 1024;
    use                epoll;
    multi_accept       on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Structured access log format ──────────────────────────────────────────
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$bytes_sent,'
            '"upstream":"$upstream_addr",'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # ── Performance tuning ────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain application/json application/javascript
                      text/css application/xml;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header X-Content-Type-Options    "nosniff"       always;
    add_header Referrer-Policy           "no-referrer"   always;
    server_tokens off;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # Predict endpoint: max 30 req/s per IP — protect the ML service
    limit_req_zone $binary_remote_addr zone=predict_limit:10m rate=30r/s;
    # General API: max 100 req/s per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=100r/s;

    # ── Upstream: 3 Node.js API instances (round-robin) ───────────────────────
    # Docker Compose DNS resolves 'node-backend' to ALL replica IPs.
    # Nginx resolves this with the resolver directive on each request so new
    # containers are discovered automatically after --scale.
    upstream node_backend {
        # Docker internal DNS
        server node-backend:3000;

        # Load-balancing strategy
        # (default = round-robin; uncomment below for least-connections)
        # least_conn;

        # Keepalive pool to Node instances — avoids TCP handshake overhead
        keepalive 32;
    }

    # ── Main server block ─────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── Nginx self health check — used by Docker healthcheck ──────────────
        location = /health {
            access_log off;
            return 200 '{"status":"ok","service":"nginx"}';
            add_header Content-Type application/json;
        }

        # ── Nginx status page (internal only) ─────────────────────────────────
        location = /nginx-status {
            stub_status on;
            allow 127.0.0.1;
            allow 172.16.0.0/12;   # Docker network range
            deny  all;
            access_log off;
        }

        # ── Predict endpoint — strict rate limiting ───────────────────────────
        location /api/predict-user {
            limit_req zone=predict_limit burst=10 nodelay;
            limit_req_status 429;

            proxy_pass         http://node_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Propagate which Node instance handled this — useful for tracing
            proxy_set_header   X-Instance-Id     $upstream_addr;

            proxy_connect_timeout  5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
        }

        # ── All other API routes ──────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            limit_req_status 429;

            proxy_pass         http://node_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Instance-Id     $upstream_addr;

            proxy_connect_timeout  5s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
        }

        # ── Node health passthrough ───────────────────────────────────────────
        location = /node-health {
            proxy_pass http://node_backend/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        # ── Error pages ───────────────────────────────────────────────────────
        error_page 429 /429.json;
        location = /429.json {
            internal;
            return 429 '{"error":"Too Many Requests","retry_after":1}';
            add_header Content-Type application/json;
        }

        error_page 502 503 504 /5xx.json;
        location = /5xx.json {
            internal;
            return 503 '{"error":"Service temporarily unavailable","message":"All backend instances are busy. Please retry in a moment."}';
            add_header Content-Type application/json;
        }
    }
}
